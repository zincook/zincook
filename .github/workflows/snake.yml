name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: zincook
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg
